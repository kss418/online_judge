services:
  http_server:
    build:
      context: .
      target: http_runtime
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    command: ["./http_server"]

  judge_server:
    build:
      context: .
      target: judge_runtime
    env_file:
      - .env
    profiles:
      - manual
    command: ["./judge_server"]
