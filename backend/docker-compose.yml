services:
  http_server:
    build:
      context: .
      target: http_runtime
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    command: ["./http_server"]

  judge_server:
    build:
      context: .
      target: judge_runtime
      args:
        JUDGE_NSJAIL_PATH: "${JUDGE_NSJAIL_PATH:-}"
        JUDGE_CPP_COMPILER_PATH: "${JUDGE_CPP_COMPILER_PATH:-}"
        JUDGE_PYTHON_PATH: "${JUDGE_PYTHON_PATH:-}"
        JUDGE_JAVA_COMPILER_PATH: "${JUDGE_JAVA_COMPILER_PATH:-}"
        JUDGE_JAVA_RUNTIME_PATH: "${JUDGE_JAVA_RUNTIME_PATH:-}"
    env_file:
      - .env
    profiles:
      - manual
    privileged: true
    command: ["./judge_server"]
